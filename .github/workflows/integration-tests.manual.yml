name: Integration Tests (Manual)

on:
    workflow_dispatch:
        inputs:
            suite:
                description: "Suite to run"
                required: true
                default: external
                type: choice
                options:
                    - external
                    - openai
                    - all
    schedule:
        - cron: "0 6 * * 1"

jobs:
    external:
        if: ${{ github.event_name == 'schedule' || inputs.suite == 'external' || inputs.suite == 'all' }}
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                  python-version: "3.13"
            - name: Install deps
              run: |
                  python -m pip install --upgrade pip
                  pip install -r backend/requirements.txt
                  pip install pytest pytest-asyncio pytest-cov
            - name: Run external-marked tests
              run: pytest -m "external" -q -rs backend/tests agents/tests

    openai:
        if: ${{ (github.event_name == 'schedule' || inputs.suite == 'openai' || inputs.suite == 'all') && secrets.OPENAI_API_KEY != '' }}
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                  python-version: "3.13"
            - name: Install deps
              run: |
                  python -m pip install --upgrade pip
                  pip install -r backend/requirements.txt
                  pip install pytest pytest-asyncio pytest-cov
            - name: Run OpenAI-marked tests
              env:
                  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
              run: pytest -v -m "openai" agents/tests

    no-openai-secret:
        if: ${{ (github.event_name == 'workflow_dispatch') && (inputs.suite == 'openai' || inputs.suite == 'all') && secrets.OPENAI_API_KEY == '' }}
        runs-on: ubuntu-latest
        steps:
            - name: Skip message
              run: echo "OPENAI_API_KEY is not set. Skipping OpenAI tests."
