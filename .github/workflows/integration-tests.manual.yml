name: Integration Tests (Manual)

on:
    workflow_dispatch:
        inputs:
            suite:
                description: "Suite to run"
                required: true
                default: external
                type: choice
                options:
                    - external
                    - openai
                    - all
    schedule:
        - cron: "0 6 * * 1"

jobs:
    external:
        if: ${{ github.event_name == 'schedule' || inputs.suite == 'external' || inputs.suite == 'all' }}
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                  python-version: "3.13"
            - name: Install deps
              run: |
                  python -m pip install --upgrade pip
                  pip install -r backend/requirements.txt
                  pip install -e backend
                  pip install -e agents
                  pip install pytest pytest-asyncio pytest-cov
            - name: Run external-marked tests
              run: |
                  (cd backend && pytest -m "external" -q -rs) || code=$?
                  if [ "${code:-0}" -ne 0 ] && [ "${code}" -ne 5 ]; then
                    exit "${code}"
                  fi
                  (cd agents && pytest -m "external" -q -rs)

    openai:
        if: ${{ github.event_name == 'schedule' || inputs.suite == 'openai' || inputs.suite == 'all' }}
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                  python-version: "3.13"
            - name: Install deps
              run: |
                  python -m pip install --upgrade pip
                  pip install -r backend/requirements.txt
                  pip install -e backend
                  pip install -e agents
                  pip install pytest pytest-asyncio pytest-cov
            - name: Init DB schema
              run: |
                  cd backend
                  python -m alembic upgrade head
                  python -m alembic current
            - name: Run OpenAI-marked tests
              env:
                  OPENAI_API_KEY: ${{ secrets['OPENAI_API_KEY'] }}
              run: |
                  if [ -n "$OPENAI_API_KEY" ]; then
                    (cd agents && pytest -v -m "openai" -rs) || code=$?
                    if [ "${code:-0}" -ne 0 ] && [ "${code}" -ne 5 ]; then
                      exit "${code}"
                    fi
                  else
                    echo "OPENAI_API_KEY is not set. Skipping OpenAI tests."
                  fi
