name: Python Tests (Offline)

on:
    push:
        branches: [main]
        paths:
            - "backend/**"
            - "agents/**"
            - ".github/workflows/python-tests.ci.yml"
    pull_request:
        branches: [main]
        paths:
            - "backend/**"
            - "agents/**"

jobs:
    backend:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: backend
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                  python-version: "3.13"
            - name: Install deps
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt
                  pip install pytest pytest-asyncio pytest-cov
            - name: Run backend offline tests
              run: pytest -m "not external and not openai" --cov=app --cov-report=xml --cov-report=term-missing
            - name: Upload backend coverage
              uses: codecov/codecov-action@v4
              with:
                  files: ./backend/coverage.xml

    agents:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                  python-version: "3.13"
            - name: Install deps
              run: |
                  python -m pip install --upgrade pip
                  pip install -r backend/requirements.txt
                  pip install pytest pytest-asyncio
            - name: Run agent offline tests
              run: pytest -v -m "not external and not openai" agents/tests
